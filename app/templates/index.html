<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>user interface</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: "Segoe UI", Tahoma, sans-serif;
            background: linear-gradient(120deg, #e0f7fa, #b49d9d);
        }
        .container{
            width: 500px;
            margin: 70px auto;
            padding: 30px;
            background: #ffffff;
            border-radius: 15px;
            box-shadow: 10px 8px 20px rgba(0,0,0,0.15); 
        }
        h3{
            text-align: center;
            color: #26a935;
            margin-bottom: 5px;
            margin-top: 10px;
            text-decoration: underline;
        }
        p {
            text-align: center;
            color: #349ea0;
            font-size: 17px;
            margin-bottom: 20px;

        }
        label{
            font-weight: 600;
            font-size: 14px;
            margin-top: 10px;
            display: block;
        }
        input , select{
            width: 100%;
            padding: 10px;
            margin-top: 6px;
            border-radius: 10px;
            border: 1px solid #ccc;
            font-size: 14px;
        }

        button{
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            border-radius: 10px;
            border: none;
            background: #26a935;
            font-weight: bold;
            color: #ffffff;
            font-size: 16px;
            cursor: pointer;
        }

         .result {
            margin-top: 20px;
            padding: 12px;
            text-align: center;
            font-size: 16px;
            font-weight: bold;
            border-radius: 5px;
        }

        .high {
            background: #ffebee;
            color: #c62828;
        }

        .low {
            background: #e8f5e9;
            color: #2e7d32;
        }

    </style>
</head>
<body>
    <div class="container">
    <h3>Strooke Risk Prediction</h3>
    <p>Enter patiet health detail</p>
    <form action="/predict" method="post">
        <label>Age</label>
        <input type="number" name="age" placeholder="Enter your age" required>
        <label >Hypertension</label>
        <select name="Hypertension" required>
            <option value="0">NO</option>
            <option value="1">YES</option>
        </select>
        <label>Heart Disease</label>
        <select name="heart_disease" required>
            <option value="0">NO</option>
            <option value="1">YES</option>
        </select>
        <label>Average Glucose Level</label>
        <input type="number" step="0.01" name="avg_glucose_level" placeholder="Enter your average glucose level" required>
        <label>BMI</label>
        <input type="number" step="0.01" name="bmi" placeholder="Enter your BMI" required>
        <label>Gender</label>
<select name="gender" required>
    <option value="1">Male</option>
    <option value="0">Female</option>
</select>

<label>Ever Married</label>
<select name="ever_married" required>
    <option value="1">Yes</option>
    <option value="0">No</option>
</select>

<label>Work Type</label>
<select name="work_type" required>
    <option value="0">Govt Job</option>
    <option value="1">Never Worked</option>
    <option value="2">Private</option>
    <option value="3">Self-employed</option>
    <option value="4">Children</option>
</select>

<label>Residence Type</label>
<select name="Residence_type" required>
    <option value="0">Rural</option>
    <option value="1">Urban</option>
</select>

<label>Smoking Status</label>
<select name="smoking_status" required>
    <option value="0">Never Smoked</option>
    <option value="1">Formerly Smoked</option>
    <option value="2">Smokes</option>
    <option value="3">Unknown</option>
</select>

        <button type="submit">Predict Risk</button>

    </form>
    {% if prediction_text %}
        <div class="result {% if 'High' in prediction_text %}high{% else %}low{% endif %}">
            {{ prediction_text }}
        </div>
    {% endif %}
    </div>
</body>
</html>
